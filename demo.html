<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>SkyEngine — live demo</title>
<style>
  html, body { margin: 0; height: 100%; background: #05060f; overflow: hidden; font-family: system-ui, sans-serif; }
  #sky { position: fixed; inset: 0; width: 100%; height: 100%; touch-action: none; }
  .ui { position: fixed; top: 12px; left: 12px; display: flex; gap: 6px; flex-wrap: wrap; z-index: 10; }
  .ui button {
    background: rgba(20,22,45,.82); color: #cdd3f0; border: 1px solid rgba(140,160,255,.3);
    border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; backdrop-filter: blur(6px);
  }
  .ui button:hover { background: rgba(40,44,80,.9); }
  .info {
    position: fixed; bottom: 12px; left: 12px; z-index: 10; color: #8a93c0; font-size: 12px;
    background: rgba(10,12,26,.7); padding: 6px 10px; border-radius: 8px;
  }
  .info b { color: #cdd3f0; }
  #sel {
    position: fixed; bottom: 12px; right: 12px; z-index: 10; color: #e9ecff; font-size: 13px;
    background: rgba(20,22,45,.85); padding: 8px 14px; border-radius: 8px; border: 1px solid rgba(140,160,255,.3);
    display: none;
  }
</style>
</head>
<body>
<canvas id="sky"></canvas>

<div class="ui">
  <button data-opt="constellations">Constellations</button>
  <button data-opt="labels">Star names</button>
  <button data-opt="dsos">Deep sky</button>
  <button data-opt="milkyway">Milky Way</button>
  <button data-opt="planets">Planets</button>
  <button data-opt="meteors">Meteors</button>
  <button id="orion">Fly to Orion</button>
  <button id="horizon">🌅 Horizon view</button>
</div>

<div class="info">Drag to look around · scroll/pinch to zoom · click an object · <b>SkyEngine</b></div>
<div id="sel"></div>

<script src="sky-data.js"></script>
<script src="sky-engine.js"></script>
<script>
  const eng = new SkyEngine(document.getElementById('sky'), SKY, { conNameKey: 'e' });
  eng.set('constellations', true);
  eng.set('milkyway', true);
  eng.set('planets', true);
  eng.start();

  // toggle buttons
  const state = { constellations: true, labels: false, dsos: false, milkyway: true, planets: true, meteors: false };
  document.querySelectorAll('[data-opt]').forEach(btn => {
    const k = btn.dataset.opt;
    if (state[k]) btn.style.borderColor = '#7c8cff';
    btn.addEventListener('click', () => {
      state[k] = !state[k];
      eng.set(k, state[k]);
      btn.style.borderColor = state[k] ? '#7c8cff' : 'rgba(140,160,255,.3)';
    });
  });

  // fly to Orion's Belt
  document.getElementById('orion').addEventListener('click', () => eng.flyTo(83.8, -1.2, 26, 1800));

  // horizon mode — "what you'd actually see looking up from here, now"
  const hbtn = document.getElementById('horizon');
  let horizon = false;
  hbtn.addEventListener('click', () => {
    horizon = !horizon;
    if (horizon) {
      // uses the browser's geolocation if granted, else falls back to Paris
      const go = (lat, lon) => {
        eng.setHorizon(lat, lon, new Date());
        eng.lookAtAltAz(180, 30, 90);           // face South, 30° up
        hbtn.textContent = '🗺️ Sky-map view';
        hbtn.style.borderColor = '#7c8cff';
      };
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => go(pos.coords.latitude, pos.coords.longitude),
          () => go(48.8566, 2.3522),
          { timeout: 6000 });
      } else { go(48.8566, 2.3522); }
    } else {
      eng.setEquatorial();
      hbtn.textContent = '🌅 Horizon view';
      hbtn.style.borderColor = 'rgba(140,160,255,.3)';
    }
  });

  // selection readout
  const sel = document.getElementById('sel');
  eng.onSelect = obj => {
    if (!obj) { sel.style.display = 'none'; return; }
    sel.style.display = 'block';
    sel.innerHTML = '<b>' + (obj.name || obj.type) + '</b>' +
      (obj.mag != null ? ' · mag ' + obj.mag : '') +
      '<br><span style="opacity:.6">RA ' + obj.ra.toFixed(1) + '° · Dec ' + obj.dec.toFixed(1) + '°</span>';
  };
</script>
</body>
</html>
